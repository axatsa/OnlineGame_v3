services:
  db:
    image: postgres:15-alpine
    container_name: online_games_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: online_games_backend_prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - db
    networks:
      - app_network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: online_games_frontend_prod
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.online_games_frontend.rule=Host(`classplay.uz`) || Host(`www.classplay.uz`)"
      - "traefik.http.routers.online_games_frontend.entrypoints=websecure"
      - "traefik.http.routers.online_games_frontend.tls=true"
      - "traefik.http.routers.online_games_frontend.tls.certresolver=le"
      - "traefik.docker.network=web"
      - "traefik.http.services.online_games_frontend.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - app_network
      - web

volumes:
  postgres_data_prod:

networks:
  app_network:
    driver: bridge
  web:
    external: true
